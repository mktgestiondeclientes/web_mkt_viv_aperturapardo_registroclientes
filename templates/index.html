{% extends "layout.html" %}
{% block content %}
<div class="text-center">
    <h1 class="text-2xl font-bold mb-2">Destinos al Sabor</h1>
    <p class="text-gray-600 mb-6">¿Ya tienes tu entrada? Perfecto, ahora ingresa tu documento para comenzar tu registro.</p>
</div>
<form id="verifyForm" action="/verify" method="post" class="space-y-4">
    <input type="hidden" name="promotor" value="{{ promotor }}">
    <div>
        <label for="tipo_documento" class="block mb-1 font-medium">Tipo de Documento</label>
        <select name="tipo_documento" id="tipo_documento" required class="w-full p-2 border rounded">
            <option value="">Seleccionar...</option>
            <option value="DNI">DNI</option>
            <option value="CE">CE</option>
        </select>
    </div>
    <div>
        <label for="id_documento" class="block mb-1 font-medium">Número de Documento</label>
        <input type="text" name="id_documento" id="id_documento" required inputmode="numeric" pattern="[0-9]*" class="w-full p-2 border rounded" placeholder="Escribe aquí tu número">
        <p id="doc-error" class="text-red-500 text-sm mt-1 hidden"></p>
    </div>
    <!-- CAMBIO: Nuevo campo para Apellido Paterno -->
    <div>
        <label for="apellido_paterno" class="block mb-1 font-medium">Apellido Paterno</label>
        <input type="text" name="apellido_paterno" id="apellido_paterno" required class="w-full p-2 border rounded uppercase" placeholder="Escribe aquí tu apellido" oninput="this.value = this.value.toUpperCase()">
    </div>
    <button type="submit" id="submitBtn" disabled class="w-full bg-primary text-white py-2 rounded hover:bg-opacity-90 disabled:bg-gray-400 disabled:cursor-not-allowed">
        Empezar
    </button>
</form>
<script>
    const docTypeSelect = document.getElementById('tipo_documento');
    const docIdInput = document.getElementById('id_documento');
    const apePaternoInput = document.getElementById('apellido_paterno'); // <-- CAMBIO
    const submitBtn = document.getElementById('submitBtn');
    const errorMsg = document.getElementById('doc-error');

    function validate() {
        const type = docTypeSelect.value;
        const id = docIdInput.value;
        const apellido = apePaternoInput.value; // <-- CAMBIO

        let isDocValid = false;
        errorMsg.classList.add('hidden');

        if (type === 'DNI') {
            isDocValid = id.length === 8 && /^\d{8}$/.test(id);
            if (id.length > 0 && !isDocValid) {
                errorMsg.textContent = 'El DNI debe tener 8 dígitos.';
                errorMsg.classList.remove('hidden');
            }
        } else if (type === 'CE') {
            // <!-- CAMBIO: Se actualizó de 10 a 12 dígitos -->
            isDocValid = id.length === 12 && /^\d{12}$/.test(id);
            if (id.length > 0 && !isDocValid) {
                // <!-- CAMBIO: Se actualizó el mensaje de error -->
                errorMsg.textContent = 'El CE debe tener 12 dígitos.';
                errorMsg.classList.remove('hidden');
            }
        }
        
        // <-- CAMBIO: El botón se activa solo si el documento Y el apellido son válidos
        submitBtn.disabled = !(isDocValid && apellido.trim().length > 0);
    }

    docTypeSelect.addEventListener('input', validate);
    docIdInput.addEventListener('input', validate);
    apePaternoInput.addEventListener('input', validate); // <-- CAMBIO
</script>
{% endblock %}
