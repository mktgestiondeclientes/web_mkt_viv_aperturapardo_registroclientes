{% extends "layout.html" %}
{% block content %}
<div class="text-center">
    <h1 class="text-3xl font-bold text-primary mb-4">¡Gracias, {{ nombres }}!</h1>
    <p class="text-gray-700 text-lg mb-2">
        Confirmamos tu asistencia a <strong>Destinos al Sabor</strong> para el día {{ fecha }}.
    </p>
    <p class="text-gray-600 mb-8">
        Esperamos que disfrutes de una experiencia inolvidable.
    </p>
    <a href="/" class="block w-full text-center bg-secondary text-white py-2 rounded hover:bg-opacity-90">
        Registrar a otra persona
    </a>
</div>
{% endblock %}
